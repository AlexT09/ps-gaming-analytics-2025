bookdown::gitbook:
  css: style.css
  # Un solo HTML evita enlaces rotos (p. ej. introduccion.html) si solo se subió index.html.
  # Tras `render_book()`, el índice y el TOC usan anclas dentro del mismo archivo.
  split_by: none
  config:
    toc:
      before: |
        <li><a href="./">PS Gaming Analytics 2025</a></li>
      after: |
        <li><a href="https://github.com" target="blank">GitHub</a></li>
    download: null
    edit: null
    sharing: null